services:
  postgres:
    image: postgres:16-alpine
    container_name: sealnote-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sealnote-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: "${NODE_ENV:-production}"
      PORT: "${PORT:-3000}"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
    networks:
      - internal
    ports:
      - "127.0.0.1:3041:3000"
    command:
      [
        "sh",
        "-c",
        "node scripts/validate-env.mjs && npx prisma migrate deploy && npm run start -- --hostname 0.0.0.0 --port 3000"
      ]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  cloudflared:
    profiles: ["prod"]
    image: cloudflare/cloudflared:2026.4.1
    container_name: sealnote-cloudflared
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
    networks:
      - internal

volumes:
  postgres-data:

networks:
  internal:
    driver: bridge
